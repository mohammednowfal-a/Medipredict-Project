{% extends "base.html" %}
{% block title %}Register — MediPredict{% endblock %}
{% block content %}
<div class="auth-container">
    <div class="auth-card" style="max-width:500px">
        <div class="auth-logo">🧬</div>
        <h1 class="auth-title" data-en="Create Account" data-hi="खाता बनाएं">Create Account</h1>
        <p class="auth-subtitle" data-en="Save your diagnosis history and bookmarks" data-hi="अपना निदान इतिहास और बुकमार्क सहेजें">Save your diagnosis history and bookmarks</p>
        {% if error %}<div class="alert alert-error">{{ error }}</div>{% endif %}
        <form action="{{ url_for('register') }}" method="POST" class="auth-form">
            <div class="form-row">
                <div class="form-group">
                    <label data-en="Full Name" data-hi="पूरा नाम">Full Name</label>
                    <input type="text" name="name" class="form-input" placeholder="Your name">
                </div>
                <div class="form-group">
                    <label data-en="Age" data-hi="आयु">Age</label>
                    <input type="number" name="age" class="form-input" placeholder="Age" min="1" max="120">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label data-en="Blood Group" data-hi="रक्त समूह">Blood Group</label>
                    <select name="blood_group" class="form-input">
                        <option value="">Select</option>
                        {% for bg in ['A+','A-','B+','B-','AB+','AB-','O+','O-'] %}
                        <option>{{ bg }}</option>{% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label data-en="City" data-hi="शहर">City</label>
                    <input type="text" name="city" class="form-input" placeholder="Your city">
                </div>
            </div>
            <div class="form-group">
                <label data-en="Username" data-hi="उपयोगकर्ता नाम">Username</label>
                <input type="text" name="username" class="form-input" placeholder="Choose a username" required>
            </div>
            <div class="form-group">
                <label data-en="Password" data-hi="पासवर्ड">Password</label>
                <input type="password" name="password" class="form-input" placeholder="Choose a password" required>
            </div>
            <button type="submit" class="btn btn-primary btn-full btn-large" data-en="Create Account →" data-hi="खाता बनाएं →">Create Account →</button>
        </form>
        <div class="auth-skip">
            <span data-en="Already have an account?" data-hi="पहले से खाता है?">Already have an account?</span>
            <a href="{{ url_for('login') }}" data-en="Login" data-hi="लॉग इन">Login</a>
        </div>
    </div>
</div>
{% endblock %}
